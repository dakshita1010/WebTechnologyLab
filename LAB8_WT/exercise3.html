<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Course Enrollment System</title>
</head>
<body>
  <h1>Course Enrollment System</h1>
  <form id="courseForm">
    <label for="courseName">Course Name:</label>
    <input type="text" id="courseName" required /><br/><br/>

    <label for="instructor">Instructor:</label>
    <input type="text" id="instructor" required /><br/><br/>

    <label for="seats">Number of Seats Available:</label>
    <input type="number" id="seats" min="1" required /><br/><br/>

    <button type="submit">Enroll Student</button>
  </form>

  <h2>Results:</h2>
  <pre id="result"></pre>

  <script>
    class Course {
      constructor(name, instructor) {
        this.name = name;
        this.instructor = instructor;
      }

      displayDetails() {
        return `Course Name: ${this.name}\nInstructor: ${this.instructor}`;
      }
    }

    document.getElementById('courseForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const courseName = document.getElementById('courseName').value.trim();
      const instructor = document.getElementById('instructor').value.trim();
      const seatsInput = document.getElementById('seats').value;
      const seats = parseInt(seatsInput, 10);

      if (isNaN(seats) || seats < 1) {
        alert('Please enter a valid number of seats.');
        return;
      }

      const course = new Course(courseName, instructor);

      const details = course.displayDetails();

      const enrollmentPromise = new Promise((resolve, reject) => {
        if (seats > 0) {
          resolve('Enrollment Successful');
        } else {
          reject('Course Full');
        }
      });

      enrollmentPromise
        .then(message => {
          document.getElementById('result').textContent = `
${details}

Status: ${message}
`;
        })
        .catch(error => {
          document.getElementById('result').textContent = `
${details}

Status: ${error}
`;
        });
    });
  </script>
</body>
</html>
