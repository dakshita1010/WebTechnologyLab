<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Student Marks Calculator</title>
</head>
<body>
  <h1>Student Marks Calculator</h1>
  <form id="studentForm">
    <label for="name">Student Name:</label>
    <input type="text" id="name" required /><br/><br/>

    <label for="subjects">Number of Subjects:</label>
    <input type="number" id="subjects" min="1" required /><br/><br/>

    <button type="submit">Calculate</button>
  </form>

  <h2>Result:</h2>
  <pre id="result"></pre>

  <script>
    document.getElementById('studentForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const studentName = document.getElementById('name').value.trim();
      const numSubjects = parseInt(document.getElementById('subjects').value);

      let marks = [];

      for (let i = 1; i <= numSubjects; i++) {
        const markStr = prompt(`Enter marks for subject ${i}:`);
        const mark = parseFloat(markStr);
        if (isNaN(mark)) {
          alert('Please enter a valid number for marks.');
          i--; 
        } else {
          marks.push(mark);
        }
      }

      let totalMarks = marks.reduce((sum, current) => sum + current, 0);

      const computeAverage = (total, count) => total / count;

      const averageMarks = computeAverage(totalMarks, marks.length);

      const output = `
        Student Name: ${studentName}
        Total Marks: ${totalMarks}
        Average Marks: ${averageMarks.toFixed(2)}
      `;

      document.getElementById('result').textContent = output;
    });
  </script>
</body>
</html>
